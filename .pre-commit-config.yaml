# .pre-commit-config.yaml
#
# Runs TruffleHog locally before every commit to catch secrets
# BEFORE they reach the repo. First line of defense.
#
# Setup (one-time per machine):
#   1. Install TruffleHog:
#        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
#   2. Install pre-commit:
#        pip install pre-commit
#   3. Install the hook:
#        pre-commit install
#
# After that, TruffleHog runs automatically on every git commit.
# To run manually on all files:
#   pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail'
        language: system
        stages: ["pre-commit", "pre-push"]

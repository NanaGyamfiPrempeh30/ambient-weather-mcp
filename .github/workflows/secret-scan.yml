# .github/workflows/secret-scan.yml
# Scans commits for accidentally committed secrets (API keys, tokens, passwords).
# Uses TruffleHog, which checks against known secret patterns and entropy analysis.
#
# This was added after Wilson's API keys were accidentally committed in a docstring.
# The pre-commit hook catches secrets locally; this workflow is the safety net
# in case someone bypasses the hook or pushes from a machine without it configured.

name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for scanning commit diffs

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

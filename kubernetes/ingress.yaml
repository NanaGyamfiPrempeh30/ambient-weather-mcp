apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ambient-weather-mcp
  namespace: ambient-weather-mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: ambient-weather-mcp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ambient-weather-mcp
                port:
                  number: 8080
